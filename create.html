<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account — Ratri Nukkad</title>
    <link rel="stylesheet" href="create.css">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">

        <h1 class="card-title">Create <em>Account</em></h1>
        <p class="card-sub">Join Ratri Nukkad — it's free</p>
        <div class="card-divider"></div>

        <form class="create-form" action="customer.php" method="post">

            <!-- Full Name -->
            <div class="form-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" name="fullname" placeholder="Enter your full name" required>
            </div>

            <!-- Mobile -->
            <div class="form-group">
                <label for="mobile">Mobile Number</label>
                <div class="phone-row">
                    <select id="country-code" name="country_code" aria-label="Country code">
                        <option value="+91">🇮🇳 +91</option>
                        <option value="+1">🇺🇸 +1</option>
                        <option value="+44">🇬🇧 +44</option>
                        <option value="+971">🇦🇪 +971</option>
                    </select>
                    <input type="tel" id="mobile" name="mobile" placeholder="XXXXX XXXXX" required>
                </div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">
                    Email <span class="label-optional">(optional)</span>
                </label>
                <input type="email" id="email" name="email" placeholder="you@example.com">
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="At least 6 characters" minlength="6" required>
                <span class="input-hint">Use a mix of letters, numbers &amp; symbols for a stronger password.</span>
            </div>

            <!-- Submit -->
            <button type="submit" class="btn-submit">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                Continue
            </button>

        </form>

        <p class="terms-note">
            By creating an account, you agree to our
            <a href="#">Conditions of Use</a> and
            <a href="#">Privacy Notice</a>.
        </p>

        <p class="card-footer">
            Already have an account? <a href="login.html">Sign in</a>
        </p>

    </div>

</body>
</html>
