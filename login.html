<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url("images/img1 - fruits.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: rgba(0, 0, 0, 2);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;  /* Full viewport height */
            width: 100vw;   /* Full viewport width */
            overflow: hidden; /* Stops scrolling */
            margin: 0;
            padding: 0;
}
        .container {
            background: rgb(239, 239, 239);
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 2);
            width: 380px;
            height: 260px;
            text-align: center;
        }
        .logo {
            font-size:37px;
            margin-bottom: 20px;
        }
        input[type="email"], input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 10px;
        }
        .btn {
            background-color: #f0c14b;
            color: white;
            border: navajowhite;
            padding: 10px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
        }
        .social-login {
            display: flex;
            justify-content: space-around;
            margin-top: 10px;
        }
        .social-login img {
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
    </style>
    <link rel="icon" href="images/favicon.png" type="image/png">
</head>
<body>
    <div class="container">
        <div class="logo">LOGIN</div>
        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn"><a href="Homepage.html" style="color: black; text-decoration: none; margin-top: 20px;">Sign In</a></button>
        </form>
        <p>Don't have an account yet? <a href="create.html" style="color: #3b1b10;">Create Account</a></p>
    </div>
</body>
</html>
